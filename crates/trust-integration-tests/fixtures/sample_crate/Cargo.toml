# Sample crate for trust-integration-tests scale testing (#682)
#
# Contains 100+ functions across 20+ source files exercising various
# VcKind categories: bounds, overflow, null, div-zero, contracts, ownership.
#
# This is a standalone fixture crate (not part of the parent workspace).
# Note: Source files use #[requires]/[ensures] annotations for tRust
# verification. These are parsed by source_analysis but are not standard
# Rust attributes -- the crate compiles with `rustc` only when tRust's
# spec-attribute support is enabled.
