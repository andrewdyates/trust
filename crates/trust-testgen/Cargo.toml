# trust-testgen: Property-based test generation from verification conditions
#
# When static proof fails (VC result is Unknown or SAT), this crate generates
# Rust property-based tests as a runtime fallback. Converts VcKind into
# targeted test code with boundary values specific to the property being checked.
#
# Author: Andrew Yates <andrew@andrewdyates.com>
# Copyright 2026 Andrew Yates | License: Apache 2.0

[package]
name = "trust-testgen"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
trust-types = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
